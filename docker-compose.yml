services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
  
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      DB_HOST: "sqlserver"
      MODEL_PATH: "/app/ml/cost_model.joblib"
    volumes:
      - ./ml:/app/ml          # so the trained model is available in the container
    depends_on:
      - sqlserver

volumes:
  mssql_data:
  n8n_data: